name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dependencies.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name addexif --add-data "addexif:addexif" addexif/__main__.py
        shell: bash

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: addexif-linux
          path: dist/addexif

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: addexif-windows
          path: dist/addexif.exe

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: addexif-macos
          path: dist/addexif

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/addexif-linux/addexif release/addexif-linux
          cp artifacts/addexif-windows/addexif.exe release/addexif-windows.exe
          cp artifacts/addexif-macos/addexif release/addexif-macos

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/addexif-linux
            release/addexif-windows.exe
            release/addexif-macos
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
